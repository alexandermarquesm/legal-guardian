services:
  # Backend - Web Service
  - type: web
    name: legal-guardian-api
    runtime: node

    plan: free
    buildCommand: pnpm install
    startCommand: bun apps/backend/src/index.ts
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_MODE
        value: real

  # Frontend - Static Site
  - type: web
    name: legal-guardian-web
    runtime: static
    buildCommand: pnpm install && pnpm --filter @legal-guardian/frontend build
    staticPublishPath: apps/frontend/dist

    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GITHUB_CLIENT_ID
        sync: false
